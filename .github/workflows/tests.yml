name: Tests

on:
  push:
    branches: [main, dev]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run test suite
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Verify server imports cleanly
        run: |
          python -c "import server; print('Server import OK')"

      - name: Verify topology imports cleanly
        run: |
          python -c "from engine.topology import compute_topology_report; print('Topology import OK')"

      - name: Run working examples
        run: |
          python examples/solar_system_vs_atom.py
          python examples/electrical_vs_fluid.py
